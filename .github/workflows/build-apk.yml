name: Build Android APK

on:
  push:
    branches: [master]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build Debug APK
        run: gradle :app:assembleDebug
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: only-the-recipe-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'versionName' android/app/build.gradle | sed 's/.*"\(.*\)"/\1/')
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          # Delete existing release and tag so we can overwrite with the latest build
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          gh release create "$TAG" "$APK" \
            --title "Only The Recipe $TAG" \
            --notes "Debug build — sideload on Android (enable Unknown Sources first)."
