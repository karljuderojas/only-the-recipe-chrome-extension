<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Only The Recipe — Cached View</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: #111;
      background: #fff;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 24px 80px;
      line-height: 1.7;
    }
    #rc-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
      font-size: 13px;
      color: #888;
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .meta { color: #666; margin-bottom: 20px; }
    h2 { font-size: 17px; margin: 28px 0 10px; border-top: 1px solid #eee; padding-top: 20px; }
    ul, ol { padding-left: 1.4em; }
    li { margin-bottom: 6px; }
    .hero {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 28px;
      display: block;
    }
    .author-notes {
      background: #f0f4ff;
      border-left: 3px solid #2563eb;
      padding: 14px 18px;
      margin-top: 28px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-line;
    }
    .author-notes strong { display: block; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: #2563eb; }
    .notes-block {
      background: #fffbea;
      border-left: 3px solid #f6c90e;
      padding: 12px 16px;
      margin-top: 28px;
      border-radius: 4px;
      font-size: 14px;
      white-space: pre-wrap;
    }
    a { color: #2563eb; }
    #not-found { padding: 60px 0; text-align: center; color: #999; }
  </style>
</head>
<body>
  <div id="rc-header">
    <strong>Only The Recipe</strong>
    <span>·</span>
    <span id="source-link"></span>
  </div>

  <div id="content">
    <div id="not-found" style="display:none">Recipe not found — it may have been deleted.</div>
    <div id="recipe-body"></div>
  </div>

  <script src="../storage/storage.js"></script>
  <script src="cache.js"></script>
</body>
</html>
